services:
  pdf-converter:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      CONVERTER_SERVICE_URL: http://converter-engine:8000
    depends_on:
      converter-engine:
        condition: service_started

  converter-engine:
    build:
      context: ./converter-service
      dockerfile: Dockerfile
    expose:
      - "8000"
